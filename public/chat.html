<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="ie=edge" />
  <link
    rel="icon"
    type="image/png"
    href="https://images.vexels.com/media/users/3/139911/isolated/preview/1afb4038427b2bd8edd275940aea269d-chat-service-icon-by-vexels.png"
  />
  <title>Chat</title>

  <link
    rel="stylesheet"
    href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css"
    integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm"
    crossorigin="anonymous"
  />

  <!-- Page CSS -->
  <link href="css/pages/chat-app-page.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <link href="css/chat.css" rel="stylesheet" />
  <link href="css/animate.css" rel="stylesheet" />
  <link href="css/colors/default-dark.css" id="theme" rel="stylesheet" />
  <!-- Chat page custom -->
  <link href="css/chat-custom.css" rel="stylesheet" />
</head>

<body class="fix-header single-column card-no-border fix-sidebar">

  <div id="main-wrapper">
    <div class="page-wrapper">
      <div class="container-fluid">
        <div class="row animated fadeIn">
          <div class="col-12">
            <div class="card m-b-0">

              <div class="chat-main-box">

                <!-- ── Left panel: user list ─────────────────── -->
                <div class="chat-left-aside">
                  <div class="open-panel"><i class="ti-angle-right"></i></div>
                  <div class="chat-left-inner">
                    <div class="form-material">
                      <input
                        id="searchUsers"
                        class="form-control p-20"
                        type="text"
                        placeholder="Buscar usuario…"
                        autocomplete="off"
                      />
                    </div>
                    <ul class="chatonline style-none" id="divUsuarios"></ul>
                  </div>
                </div>

                <!-- ── Right panel: chat area ────────────────── -->
                <div class="chat-right-aside">

                  <div class="chat-main-header">
                    <div id="titleChat" class="p-20 b-b"></div>
                  </div>

                  <div class="chat-rbox">
                    <ul class="chat-list p-20" id="divChatbox"></ul>
                  </div>

                  <!-- Typing indicator lives between the message list and the form -->
                  <div id="typingIndicator"></div>

                  <div class="card-body b-t">
                    <form id="formEnviar">
                      <div class="row align-items-center">
                        <div class="col-9">
                          <input
                            autocomplete="off"
                            id="txtMensaje"
                            placeholder="Escribe tu mensaje aquí"
                            class="form-control b-0"
                            maxlength="500"
                            autofocus
                          />
                        </div>
                        <div class="col-3 text-right">
                          <button type="submit" class="btn btn-info btn-circle btn-lg" title="Enviar">
                            <i class="fa fa-paper-plane-o"></i>
                          </button>
                        </div>
                      </div>
                    </form>
                  </div>

                </div>
                <!-- ── End right panel ───────────────────────── -->

              </div>

            </div>
          </div>
        </div>
      </div>

      <footer class="footer text-center p-2">
        Socket Chat &copy; 2026
      </footer>
    </div>
  </div>

  <!-- Scripts – ORDER MATTERS -->
  <script src="js/libs/jquery.min.js"></script>
  <script src="socket.io/socket.io.js"></script>

  <!-- UI module must be loaded before the socket module -->
  <script src="js/socket-chat-jquery.js"></script>
  <script src="js/socket-chat.js"></script>
  <script src="js/chat-init.js"></script>

</body>
</html>
